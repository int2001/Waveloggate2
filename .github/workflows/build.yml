name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3) — used for the .deb package name'
        required: false
        default: '0.0.0-dev'
      create_release:
        description: 'Create a GitHub release from this run'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: WaveLogGate-darwin-arm64
          - os: macos-latest
            platform: darwin/amd64
            artifact: WaveLogGate-darwin-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact: WaveLogGate-windows-amd64
          - os: windows-latest
            platform: windows/386
            artifact: WaveLogGate-windows-x86
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: WaveLogGate-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Sign (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::notice::APPLE_CERTIFICATE not set — skipping code signing"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12
          CERT_NAME=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $CERT_NAME"
          /usr/bin/codesign --force --options runtime \
            --entitlements build/darwin/entitlements.plist \
            -s "$CERT_NAME" \
            --deep "build/bin/WaveLogGate.app"

      - name: Package (macOS — create DMG)
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "WaveLogGate" \
            -srcfolder build/bin/WaveLogGate.app \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg

      - name: Notarize (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_ID" ]; then
            echo "::notice::Notarization secrets not set — skipping"
            exit 0
          fi
          xcrun notarytool submit ${{ matrix.artifact }}.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          xcrun stapler staple ${{ matrix.artifact }}.dmg

      - name: Package (Linux — create .deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
            if [[ ! "$VERSION" =~ ^[0-9] ]]; then
              VERSION="0.0.0"
            fi
          fi
          PKG="wavelog-gate_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/WaveLogGate "${PKG}/usr/local/bin/wavelog-gate"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/wavelog-gate.png"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=WaveLogGate' \
            'Comment=Amateur radio gateway to WaveLog' \
            'Exec=/usr/local/bin/wavelog-gate' \
            'Icon=wavelog-gate' \
            'Type=Application' \
            'Categories=HamRadio;Network;' \
            > "${PKG}/usr/share/applications/wavelog-gate.desktop"

          printf 'Package: wavelog-gate\nVersion: %s\nArchitecture: amd64\nMaintainer: Joerg <joerg@dj7nt.de>\nDescription: WaveLogGate\n Connects WSJT-X/FLDigi and FLRig/Hamlib to WaveLog web logging platform.\n' \
            "${VERSION}" > "${PKG}/DEBIAN/control"

          dpkg-deb --build "${PKG}"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        run: cp build/bin/WaveLogGate.exe ${{ matrix.artifact }}.exe
        shell: bash
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: '*.deb'

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}
          files: |
            artifacts/WaveLogGate-darwin-arm64/*.dmg
            artifacts/WaveLogGate-darwin-amd64/*.dmg
            artifacts/WaveLogGate-windows-amd64/WaveLogGate-windows-amd64.exe
            artifacts/WaveLogGate-windows-x86/WaveLogGate-windows-x86.exe
            artifacts/WaveLogGate-linux-amd64/*.deb
