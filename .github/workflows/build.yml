name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3) — used for the .deb package name'
        required: false
        default: '0.0.0-dev'
      create_release:
        description: 'Create a GitHub release from this run'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: WaveLogGate-darwin-arm64
          - os: macos-13
            platform: darwin/amd64
            artifact: WaveLogGate-darwin-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact: WaveLogGate-windows-amd64
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: WaveLogGate-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Package (macOS — create DMG)
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "WaveLogGate" \
            -srcfolder build/bin/WaveLogGate.app \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg

      - name: Package (Linux — create .deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
            if [[ ! "$VERSION" =~ ^[0-9] ]]; then
              VERSION="0.0.0"
            fi
          fi
          PKG="wavelog-gate_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/WaveLogGate "${PKG}/usr/local/bin/wavelog-gate"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/wavelog-gate.png"

          cat > "${PKG}/usr/share/applications/wavelog-gate.desktop" << 'DESKTOP'
[Desktop Entry]
Name=WaveLogGate
Comment=Amateur radio gateway to WaveLog
Exec=/usr/local/bin/wavelog-gate
Icon=wavelog-gate
Type=Application
Categories=HamRadio;Network;
DESKTOP

          cat > "${PKG}/DEBIAN/control" << CTRL
Package: wavelog-gate
Version: ${VERSION}
Architecture: amd64
Maintainer: Joerg <joerg@dj7nt.de>
Description: WaveLogGate
 Connects WSJT-X/FLDigi and FLRig/Hamlib to WaveLog web logging platform.
CTRL

          dpkg-deb --build "${PKG}"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/WaveLogGate.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: '*.deb'

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}
          files: |
            artifacts/WaveLogGate-darwin-arm64/*.dmg
            artifacts/WaveLogGate-darwin-amd64/*.dmg
            artifacts/WaveLogGate-windows-amd64/WaveLogGate.exe
            artifacts/WaveLogGate-linux-amd64/*.deb
